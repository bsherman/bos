---
name: Build bOS Images
on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      image_flavor:
        type: string
      publish_schedule:
        type: string
        default: '41 6 * * 0'
concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref
    || github.run_id }}-${{ inputs.image_flavor }}
  cancel-in-progress: true
env:
  IMAGE_REGISTRY: ghcr.io/bsherman
  IMAGE_NAME: bos
  SET_X: 1
jobs:
  get-images:
    name: Get ${{ inputs.image_flavor }} Images for Build
    outputs:
      images: ${{ steps.images.outputs.images }}
      manifest_images: ${{ steps.images.outputs.manifest_images }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get Images for Build
        id: images
        uses: ./.github/actions/get-images
        with:
          image_flavor: ${{ inputs.image_flavor }}
  build-image:
    name: >-
      Build ${{ inputs.image_flavor }} Images
      (${{ matrix.combo.image }}/${{ matrix.combo.arch }})
    needs: get-images
    runs-on: ${{ matrix.combo.runner }}
    continue-on-error: false
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJson(needs.get-images.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v4

      - name: Show disk space (before cleanup)
        run: sudo df -h

      - name: Check if /mnt is there
        id: check_mnt
        run: |
          if sudo mountpoint /mnt; then
            echo "mnt_is_there=1" >>$GITHUB_OUTPUT
          else
            echo "mnt_is_there=0" >>$GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        # v1.3.1
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          # These image builds do not use the runner's preinstalled language
          # toolchains, and the tool cache is one of the largest directories on
          # the root filesystem.
          tool-cache: true

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@main
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        with:
          target-dir: /var/lib/containers

      - name: Redirect temp files to /mnt
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        shell: bash
        run: |
          sudo mkdir -p /mnt/tmp
          sudo chmod 1777 /mnt/tmp
          echo "TMPDIR=/mnt/tmp" >> "${GITHUB_ENV}"
          echo "CHUNK_OUTPUT_DIR=/mnt/tmp" >> "${GITHUB_ENV}"

      - name: Show disk space (after cleanup)
        run: sudo df -h

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v2.6.1'

      - name: Install Just
        uses: >-
          extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3

      - name: Build Image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # just build ${{ matrix.combo.image }}
          sudo env \
            XDG_RUNTIME_DIR=/tmp \
            TMPDIR="${TMPDIR:-/tmp}" \
            PATH="$PATH" \
            GITHUB_TOKEN="$GITHUB_TOKEN" \
            just build ${{ matrix.combo.image }}

      - name: Chunk Image
        shell: bash
        run: |
          sudo env \
            XDG_RUNTIME_DIR=/tmp \
            TMPDIR="${TMPDIR:-/tmp}" \
            CHUNK_OUTPUT_DIR="${CHUNK_OUTPUT_DIR:-}" \
            PATH="$PATH" \
            just chunk ${{ matrix.combo.image }}

      - name: Load Chunked OCI
        shell: bash
        run: |
          just load-chunked-oci ${{ matrix.combo.image }}

      - name: Get Tags
        id: get_tags
        shell: bash
        run: |
          tags=$(just get-tags ${{ matrix.combo.image }})
          echo "tags=$tags" >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT

      - name: Compute Push Tags
        id: push_tags
        shell: bash
        run: |
          TAGS="${{ steps.get_tags.outputs.tags }}"
          ARCH="${{ matrix.combo.arch }}"
          SUFFIXED=""
          for tag in $TAGS; do
            SUFFIXED+="${tag}-${ARCH} "
          done
          TAGS="${SUFFIXED% }"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Report Publish Mode
        shell: bash
        run: |
          echo "Image: ${{ matrix.combo.image }}"
          echo "Arch: ${{ matrix.combo.arch }}"
          echo "Tags: ${{ steps.push_tags.outputs.tags }}"
          echo "Arch-specific image will be pushed on publishing runs."
          echo "Manifest assembly and signing happen in create-manifest."

      # NOTE: disabled secureboot check since bluefin LTS will never pass
      # - name: Check Secureboot
      #  id: secureboot
      #  shell: bash
      #  run: |
      #    just secureboot ${{ matrix.combo.image }}
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}
      - name: Push to GHCR
        id: push
        if: >-
          contains(fromJson('["workflow_dispatch", "merge_group"]'),
          github.event_name) || github.event.schedule == inputs.publish_schedule
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        shell: bash
        run: |
          echo "${REGISTRY_PASSWORD}" \
            | podman login ghcr.io \
                --username "${REGISTRY_USER}" \
                --password-stdin
      - name: Push Chunked Image to GHCR
        uses: ./.github/actions/push-image
        id: push_chunked
        if: >-
          contains(fromJson('["workflow_dispatch", "merge_group"]'),
          github.event_name) || github.event.schedule == inputs.publish_schedule
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ matrix.combo.image }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: ${{ steps.push_tags.outputs.tags }}
          image-registry: ${{ steps.registry_case.outputs.lowercase }}
          compression-format: zstd:chunked
  create-manifest:
    name: Create Manifest (${{ matrix.entry.image }})
    needs: [get-images, build-image]
    if: >-
      (contains(fromJson('["workflow_dispatch", "merge_group"]'),
      github.event_name) || github.event.schedule == inputs.publish_schedule)
      && needs.get-images.outputs.manifest_images != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.get-images.outputs.manifest_images) }}
    steps:
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}
      - name: Login to GHCR for Manifest Push
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | podman login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin
      - name: Get Version Tag
        id: version
        run: |
          REGISTRY="${{ steps.registry_case.outputs.lowercase }}"
          IMG="${REGISTRY}/${{ env.IMAGE_NAME }}"
          IMAGE="${{ matrix.entry.image }}"
          ARCHES='${{ toJson(matrix.entry.arches) }}'
          FIRST_ARCH="$(jq -r '.[0]' <<< "${ARCHES}")"
          VERSION=$(skopeo inspect \
            --creds \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${IMG}:${IMAGE}-${FIRST_ARCH}" \
            | jq -r \
            '.Labels["org.opencontainers.image.version"]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create and Push Manifests
        id: push_manifests
        run: |
          REGISTRY="${{ steps.registry_case.outputs.lowercase }}"
          IMAGE="${REGISTRY}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG="${{ matrix.entry.image }}"
          ARCHES='${{ toJson(matrix.entry.arches) }}'
          VERSION="${{ steps.version.outputs.version }}"
          ANNOTATION_ARGS=(
            --annotation
            io.github.containers.compression.zstd=true
          )
          DIGESTFILE="$(mktemp -t manifest-digest.XXXXXXXXXX)"

          add_arches() {
            local manifest_ref="$1"
            local source_tag="$2"

            while read -r arch; do
              case "${arch}" in
                x86_64)
                  oci_arch="amd64"
                  ;;
                aarch64)
                  oci_arch="arm64"
                  ;;
                *)
                  echo "Unsupported architecture: ${arch}" >&2
                  exit 1
                  ;;
              esac

              podman manifest add \
                "${manifest_ref}" \
                "docker://${IMAGE}:${source_tag}-${arch}" \
                --arch "${oci_arch}" \
                "${ANNOTATION_ARGS[@]}"
            done < <(jq -r '.[]' <<< "${ARCHES}")
          }

          podman manifest create "${IMAGE}:${IMAGE_TAG}"
          add_arches "${IMAGE}:${IMAGE_TAG}" "${IMAGE_TAG}"
          podman manifest push \
            --all=false \
            --digestfile "${DIGESTFILE}" \
            "${IMAGE}:${IMAGE_TAG}"
          IMAGE_DIGEST="$(cat "${DIGESTFILE}")"

          podman manifest create "${IMAGE}:${VERSION}"
          add_arches "${IMAGE}:${VERSION}" "${VERSION}"
          podman manifest push \
            --all=false \
            --digestfile "${DIGESTFILE}" \
            "${IMAGE}:${VERSION}"
          VERSION_DIGEST="$(cat "${DIGESTFILE}")"

          echo "image_digest=${IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "version_digest=${VERSION_DIGEST}" >> "${GITHUB_OUTPUT}"
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v2.6.1'
      - name: Login to GHCR for Manifest Signing
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign Manifests
        run: |
          REGISTRY="${{ steps.registry_case.outputs.lowercase }}"
          IMAGE="${REGISTRY}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.version.outputs.version }}"

          cosign sign -y --recursive \
            --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE}@${IMAGE_DIGEST}"

          cosign sign -y --recursive \
            --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE}@${VERSION_DIGEST}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          IMAGE_DIGEST: ${{ steps.push_manifests.outputs.image_digest }}
          VERSION_DIGEST: ${{ steps.push_manifests.outputs.version_digest }}
  check:
    name: Check Build ${{ inputs.image_flavor }} Images Successful
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs: [build-image, create-manifest]
    steps:
      - name: Exit on failure
        if: >-
          ${{ contains(fromJson('["failure", "skipped"]'),
          needs.build-image.result)
          || needs.create-manifest.result == 'failure' }}
        shell: bash
        run: exit 1
      - name: Exit
        shell: bash
        run: exit 0
